springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    display-request-duration: true
  show-actuator: false           # hide actuator endpoints from docs
  packages-to-scan: com.sprint.analyzer.controller
  paths-to-match: /api/**
---
# AWS profile — activate with: --spring.profiles.active=aws
spring:
  config:
    activate:
      on-profile: aws

  datasource:
    url: ${SPRING_DATASOURCE_URL}       # injected from ECS task env / Secrets Manager
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

server:
  port: 8080

logging:
  level:
    root: WARN
    com.sprint: INFO
  pattern:
    console: '{"time":"%d","level":"%p","logger":"%logger","msg":"%m"}%n'  # structured JSON logs for CloudWatch




