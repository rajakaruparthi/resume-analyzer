spring:
  application:
    name: resume-analyzer-backend
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resume_analyzer}
    username: ${SPRING_DATASOURCE_USERNAME:sprint}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:rajakaruparthi@gmail.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000



  jpa:
    hibernate:
      ddl-auto: validate      # Flyway manages DDL; Hibernate only validates
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# Actuator — used by AWS ALB health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized


# App config
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:5173}
  mail:
    from: ${MAIL_FROM:rajakaruparthi@gmail.com}
    from-name: Resume Analyzer
  verification:
    token-ttl-minutes: 60
    base-url: ${APP_BASE_URL:http://localhost:8080}     # backend URL used in the email link
    frontend-url: ${FRONTEND_URL:http://localhost:4200} # for redirect after click
  jwt:
    secret: ${JWT_SECRET:Wa/9OyXzoFfULiY4H45aPnIqlfiA05bwBfVgjj0SS3Q=}
    access-token-expiration-minutes: 15
    refresh-token-expiration-minutes: 1440 # 24 hours
# AWS S3 Configuration

